<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — BizManager</title>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #f8f9fa;
      text-align: center;
      padding: 20px;
    }
    .box { max-width: 360px; }
    h1 { font-size: 1.4rem; color: #333; margin-bottom: 8px; }
    p { color: #666; font-size: 0.95rem; }
    button {
      margin-top: 16px;
      padding: 10px 24px;
      border-radius: 8px;
      border: none;
      background: #0d6efd;
      color: white;
      font-weight: 600;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>📡 No Connection</h1>
    <p>This page hasn't been opened before, so it can't load without internet.
       If you've used the POS page before, try going back to it — it should
       still work offline.</p>
    <button onclick="location.reload()">Try Again</button>
  </div>
</body>
</html>
