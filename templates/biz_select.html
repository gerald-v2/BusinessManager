{% extends "base.html" %}
{% block title %}Select Business{% endblock %}
{% block content %}
<h4 class="fw-bold mb-4">Select a Business</h4>
<div class="row g-3">
  {% for b in businesses %}
  <div class="col-md-4">
    <a href="{{ url_for('select_biz', biz=b) }}" class="text-decoration-none">
      <div class="card h-100 portal-card p-3">
        <div class="text-primary mb-2"><i class="bi bi-building fs-3"></i></div>
        <h5 class="fw-bold">{{ b }}</h5>
      </div>
    </a>
  </div>
  {% endfor %}
</div>
{% endblock %}
