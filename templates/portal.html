{% extends "base.html" %}
{% block content_unauth %}
<div class="d-flex justify-content-center align-items-center" style="min-height:90vh">
  <div class="text-center" style="max-width:420px;width:100%">
    <div class="mb-5">
      <i class="bi bi-briefcase-fill text-primary" style="font-size:3.5rem"></i>
      <h1 class="fw-bold mt-2 mb-1">BizManager</h1>
      <p class="text-muted">Sign in to manage your business</p>
    </div>
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <form method="POST" action="{{ url_for('business_login_route') }}">
          <div class="mb-3 text-start">
            <label class="form-label fw-semibold">Username</label>
            <input type="text" name="username" class="form-control" placeholder="Enter your username" required autofocus>
          </div>
          <div class="mb-4 text-start">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
          </div>
          <button type="submit" class="btn btn-primary w-100 fw-semibold py-2">
            <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
          </button>
        </form>
      </div>
    </div>
    <p class="text-muted mt-4" style="font-size:0.75rem">© BizManager. Authorized access only.</p>
  </div>
</div>
{% endblock %}
